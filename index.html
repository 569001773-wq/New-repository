<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>星空花瓣相册</title>

<style>

body{
margin:0;
background:black;
overflow-x:hidden;
font-family:sans-serif;
transition:background 6s;
}

/* 星星 */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 3s infinite;
}

@keyframes blink{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

/* 流星 */

.meteor{
position:absolute;
width:2px;
height:80px;
background:linear-gradient(white,transparent);
transform:rotate(45deg);
animation:meteor 1s linear;
}

@keyframes meteor{
0%{
transform:translate(0,0) rotate(45deg);
opacity:1;
}
100%{
transform:translate(300px,300px) rotate(45deg);
opacity:0;
}
}

/* 花瓣 */

.petal{
position:fixed;
top:-20px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* 相册 */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:14px;
padding:40px;
opacity:0;
transition:opacity 2s;
}

.gallery img{
width:100%;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:transform 0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="gallery" id="gallery"></div>

<script>

/* 星星 */

for(let i=0;i<150;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

star.style.animationDuration=(2+Math.random()*3)+"s"

document.body.appendChild(star)

}

/* 流星 */

function meteor(){

let m=document.createElement("div")

m.className="meteor"

m.style.left=Math.random()*80+"vw"
m.style.top=Math.random()*30+"vh"

document.body.appendChild(m)

setTimeout(()=>m.remove(),1000)

}

setInterval(meteor,4000)

/* 花瓣 */

function petal(){

let p=document.createElement("div")

p.className="petal"

p.innerHTML="🌸"

p.style.left=Math.random()*100+"vw"

p.style.animationDuration=(6+Math.random()*6)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),12000)

}

setInterval(petal,400)

/* 夜晚变白天 */

setTimeout(()=>{

document.body.style.background="linear-gradient(#87CEEB,#ffffff)"

},7000)

/* 图片 */

let images=[

"IMG_6190.jpeg",
"IMG_7931.jpeg",
"IMG_8801.jpeg",
"IMG_9442.jpeg"

]

let gallery=document.getElementById("gallery")

images.forEach(name=>{

let img=document.createElement("img")

img.src="https://raw.githubusercontent.com/569001773-wq/images/main/"+name

gallery.appendChild(img)

})

setTimeout(()=>{

gallery.style.opacity=1

},8000)

</script>

</body>
</html>
